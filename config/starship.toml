format = "$directory$git_branch$git_status$character"

[directory]
style = "bold cyan"
truncation_length = 3
truncate_to_repo = false

[git_branch]
format = " on [$symbol$branch]($style)"
symbol = "git:"
style = "bold magenta"

[git_status]
format = " [$all_status$ahead_behind]($style)"
style = "bold red"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
