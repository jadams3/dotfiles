name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  checks:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install check tools
        run: brew install fish shellcheck shfmt

      - name: Bash syntax
        run: bash -n setup-modern.sh bootstrap.sh brew.sh scripts/*.sh

      - name: Fish syntax
        run: fish --no-config -n config/fish/config.fish config/fish/functions/*.fish

      - name: ShellCheck
        run: shellcheck setup-modern.sh bootstrap.sh brew.sh scripts/*.sh

      - name: shfmt
        run: shfmt -d setup-modern.sh bootstrap.sh brew.sh scripts/*.sh

      - name: Homebrew Bundle
        run: brew bundle list --all --file Brewfile

      - name: Whitespace
        run: git diff --check
